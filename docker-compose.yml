services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        PORT: ${API_PORT:-5001}
    container_name: transitops-api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-5001}
      FRONTEND_URL: ${FRONTEND_URL:-https://pixelapp.tech}
    expose:
      - "5001"
    networks:
      - transitops

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        PORT: ${WEB_PORT:-3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://pixelapp.tech/api}
    container_name: transitops-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - transitops

  caddy:
    image: caddy:2-alpine
    container_name: transitops-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - transitops

networks:
  transitops:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
